services:
  task-db:
    image: mysql:8.0
    container_name: task_db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_PORT}"
    volumes:
      - mysql_data:/var/lib/mysql

  task-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    develop:
      watch:
        - action: sync
          path: ./api
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./api/package.json
    container_name: task_api
    env_file:
      - .env
    ports:
      - "${API_PORT}:${API_PORT}"
    depends_on:
      - task-db
  
  task-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: task_web
    ports:
      - "${WEB_PORT}:${WEB_PORT}"
    environment:
      # Inject the API URL so Vite knows where to make requests
      - VITE_API_URL=http://localhost:${API_PORT}/api/v1
    depends_on:
      - task-api

volumes:
  mysql_data: